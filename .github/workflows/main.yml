name: Build Custom RabbitMQ

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run it manually with a button

jobs:
  build-and-push-rabbit:
    runs-on: self-hosted  # Use your local Windows runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Custom RabbitMQ
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile  # Points to your RabbitMQ Dockerfile
          push: true
          # Replace 'custom-rabbitmq' with whatever name you want on Docker Hub
          tags: ${{ secrets.DOCKER_USERNAME }}/custom-rabbitmq:latest