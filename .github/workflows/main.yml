name: Build App

on: [push]

jobs:
  build-job:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Python Script
        run: python hello.py > output.txt  # We save the output to a file

      # THIS STEP CREATES THE DOWNLOADABLE LINK
      - name: Upload Build Results
        uses: actions/upload-artifact@v4
        with:
          name: my-app-build   # The name of the zip file
          path: |
            hello.py
            output.txt
          # You can also use path: ./ to upload everything